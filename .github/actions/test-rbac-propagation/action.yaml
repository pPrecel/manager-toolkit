name: 'Test RBAC Propagation'
description: 'Verifies that ClusterRole rules match the expected and forbidden permissions defined in a config file.'

inputs:
  config:
    description: 'Path to the RBAC config YAML file defining expected and forbidden rules per role.'
    required: true

runs:
  using: 'composite'
  steps:

    - name: Run RBAC propagation check
      run: go run . "${{ inputs.config }}"
      working-directory: ${{ github.action_path }}
      shell: bash
